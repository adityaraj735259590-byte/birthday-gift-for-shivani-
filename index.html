<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday!</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:linear-gradient(135deg,#ff6b6b,#ff8e53,#ffb347);
}

.container{
    text-align:center;
    padding:25px;
    width:90%;
    max-width:500px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(12px);
    border-radius:25px;
    color:white;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    animation:fadeIn 1.5s ease;
}

h1{
    font-size:2.5rem;
    margin-bottom:15px;
    animation:bounce 2s infinite;
}

.cake{
    font-size:5rem;
    margin:10px 0;
}

.message{
    font-size:1.1rem;
    line-height:1.7;
    margin-top:15px;
}

.btn{
    margin-top:20px;
    padding:12px 25px;
    border:none;
    border-radius:50px;
    background:white;
    color:#ff5e62;
    font-size:1rem;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.08);
}

@keyframes bounce{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* Confetti */
.confetti{
    position:absolute;
    width:10px;
    height:10px;
    top:-10px;
    opacity:0.9;
    animation:fall linear forwards;
}

@keyframes fall{
    to{
        transform:translateY(110vh) rotate(720deg);
        opacity:0;
    }
}

@media(max-width:480px){
    h1{
        font-size:2rem;
    }

    .cake{
        font-size:4rem;
    }

    .message{
        font-size:1rem;
    }
}
</style>
</head>

<body>

<div class="container">
    <h1>🎉 Happy Birthday! 🎉</h1>

    <div class="cake">🎂</div>

    <div class="message">
        Wishing you a day filled with happiness, laughter,
        wonderful surprises, and unforgettable memories.
        May all your dreams come true and your year ahead
        be full of success and joy! 💖✨
    </div>

    <button class="btn" onclick="celebrate()">
        🎁 Celebrate
    </button>
</div>

<script>
function createConfetti() {
    const colors = [
        "#ff0a54",
        "#ff477e",
        "#ff7096",
        "#fbb1bd",
        "#00f5d4",
        "#00bbf9",
        "#9b5de5",
        "#fee440"
    ];

    const confetti = document.createElement("div");
    confetti.classList.add("confetti");

    confetti.style.left = Math.random() * window.innerWidth + "px";
    confetti.style.backgroundColor =
        colors[Math.floor(Math.random() * colors.length)];

    confetti.style.width = Math.random() * 10 + 5 + "px";
    confetti.style.height = Math.random() * 10 + 5 + "px";

    confetti.style.animationDuration =
        Math.random() * 3 + 2 + "s";

    document.body.appendChild(confetti);

    setTimeout(() => {
        confetti.remove();
    }, 5000);
}

function celebrate() {
    for(let i=0; i<150; i++){
        setTimeout(createConfetti, i * 20);
    }
}

// Auto confetti on load
setInterval(createConfetti, 120);
</script>

</body>
</html>
